<h1>Create Note</h1>

<form method="POST">
    {% csrf_token %}

    <label>Title:</label><br>
    <input type="text" name="title"><br><br>

    <label>Content:</label>
    <textarea name="content"></textarea><br><br>

    <button type="submit">Save Note</button>
</form>

<br>
<a href="{% url 'note_list' %}">Back to notes</a>
